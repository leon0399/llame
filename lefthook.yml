# Git hooks (lefthook). Installed automatically by the root `prepare` script
# on `pnpm install`; disable for a single commit with `LEFTHOOK=0 git commit`
# or `git commit -n`.
#
# Each job runs only when staged files match its glob, and jobs run in
# parallel — a typical commit gates in well under a second (oxlint lints a
# whole workspace in ~0.1–0.5s). Lint jobs are check-only (no --fix): a hook
# must never mutate files behind the committer's back.

pre-commit:
  parallel: true
  jobs:
    - name: api lint (oxlint, type-aware)
      glob: "apps/api/**/*.ts"
      run: pnpm --filter api exec oxlint

    - name: web lint (oxlint)
      glob: "apps/web/**/*.{ts,tsx,js,mjs}"
      run: pnpm --filter web lint

    - name: ui lint (oxlint)
      glob: "packages/ui/**/*.{ts,tsx,js,mjs,cjs}"
      run: pnpm --filter @workspace/ui lint

    # Repo-wide, matching CI's `format:check` (which now checks the whole repo
    # via the root .prettierignore). Staged files only, so it stays instant.
    # `files` narrows to files that still exist (#173): `{staged_files}` includes
    # deletions, and `prettier --check <missing-path>` exits 2 — blocking any
    # commit that deletes a covered file AND masking real drift in survivors.
    # The glob restricts to prettier-parseable extensions (never .sql — passing
    # an unparseable file to `prettier --check` explicitly exits 2); prettier's
    # own .prettierignore still skips any staged generated/vendored path.
    - name: format (prettier)
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,md,mdx,json,jsonc,css,scss,yaml,yml,html}"
      files: git diff --name-only --cached --diff-filter=ACMR
      run: pnpm exec prettier --check --cache --no-error-on-unmatched-pattern {files}
