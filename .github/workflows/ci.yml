# Test CI (#70) — gate PRs on the checks that already pass locally:
# lint / build / unit tests across the workspace, plus apps/api/scripts/rls-test.sh
# (cross-tenant RLS isolation + the auth/chat e2e over real HTTP against a
# throwaway Postgres — same script as local, GitHub-hosted runners have Docker).
#
# Actions are pinned to commit SHAs (comment = the release tag they resolve to).

name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  checks:
    name: lint · build · unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        # version comes from package.json "packageManager"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Persist the Turborepo local cache across runs: exact-key restore per
      # commit, prefix fallback to the newest prior cache. Unchanged tasks
      # (hashed over inputs + env declared in turbo.json) replay from cache
      # instead of re-executing.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-

      - run: pnpm exec turbo run lint

      # Full-program type check on tsgo (TypeScript 7 Go port) — covers specs,
      # which `nest build` (tsconfig.build.json) and Next's bundled check
      # exclude. Emit/build stays on TypeScript 5.x.
      - run: pnpm exec turbo run typecheck

      # Formatting is no longer embedded in a lint pass (the old api ESLint ran
      # prettier as a rule) — check it explicitly. Scoped to apps/api src/test,
      # the surface the removed eslint-plugin-prettier actually enforced; the
      # rest of the repo was never format-gated (repo-wide `pnpm format`
      # normalization is a separate decision).
      - run: pnpm run format:check

      - run: pnpm exec turbo run build

      - run: git diff --exit-code

      # Unit tests via the turbo task graph (cached like every other task).
      # DB-backed suites self-skip without POSTGRES_URL / TEST_DATABASE_URL;
      # model evals stay opt-in behind RUN_MODEL_EVALS — all three are declared
      # in apps/api/turbo.json's test.env so their presence busts the cache.
      - run: pnpm exec turbo run test

  rls:
    name: RLS isolation + e2e (real Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Proves FORCE RLS cross-tenant isolation and runs the HTTP e2e suites
      # against a throwaway Postgres owned by a non-superuser role — the same
      # worst-case single-role deployment the script exercises locally.
      - run: bash apps/api/scripts/rls-test.sh

  browser-e2e:
    name: browser e2e (Playwright, worker mode)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # Node >=21 derives navigator.language from the process locale; with
      # LANG=C/unset it reports an invalid tag and `new Intl.Locale(...)`
      # throws during SSR (seen via TanStack Query devtools under next dev).
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps chromium

      # Full browser chat-flow + mid-run refresh resume (#49/#80): Playwright
      # boots a throwaway Postgres (docker), applies migrations, starts api +
      # web + the mock model server, and drives Chromium against the real
      # stack. This is the ONLY place the browser suite runs — keep it green.
      - run: pnpm test:e2e

      - if: failure() || cancelled()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
